[theme]
base            = "dark"
primaryColor    = "#38bdf8"        # sky-400  — accent / buttons
backgroundColor = "#0f172a"        # slate-900 — page background
secondaryBackgroundColor = "#1e293b"  # slate-800 — sidebar / cards
textColor       = "#e2e8f0"        # slate-200 — primary text
font            = "sans serif"

[server]
headless        = false
runOnSave       = false

[browser]
gatherUsageStats = false
